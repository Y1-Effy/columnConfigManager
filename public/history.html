<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>変更履歴 - Column Config Manager</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="settings-layout">
    <nav class="topbar">
      <a href="#" id="editorLink" style="pointer-events:none;">← エディタ</a>
      <span class="topbar-title" id="projectLabel">読み込み中...</span>
    </nav>

    <div class="settings-body">
      <div class="settings-section">
        <h2>変更履歴</h2>
        <table class="data-table master-table">
          <thead>
            <tr>
              <th scope="col">保存日時</th>
              <th scope="col">変更内容</th>
              <th scope="col" class="td-actions" style="width:100px;"></th>
            </tr>
          </thead>
          <tbody id="historyTbody">
            <tr><td colspan="3" class="text-muted">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Detail modal -->
  <div class="modal-backdrop hidden" id="historyDetailModal">
    <div class="modal modal-wide" role="dialog" aria-modal="true" aria-labelledby="historyDetailTitle">
      <div class="modal-header">
        <span id="historyDetailTitle">操作ログ詳細</span>
        <button class="modal-close" id="historyDetailClose" data-modal-close="historyDetailModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="operation-log-detail" id="historyDetailBody"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="historyDetailClose2" data-modal-close="historyDetailModal">閉じる</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="/js/history.js"></script>
</body>
</html>
